<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Styled Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #6a11cb, #606f89);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: #fff;
            padding: 25px 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2575fc;
            box-shadow: 0 0 5px #2575fc;
        }

        input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        .terms {
            margin-top: 12px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            background: #2575fc;
            color: #fff;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #6a11cb;
        }

        input:invalid {
            border-color: red;
        }

        input:valid {
            border-color: green;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Register</h2>

    <form>
        <label>Name</label>
        <input type="text" name="name" required minlength="3" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" name="email" required placeholder="Enter your email">

        <label>Age</label>
        <input type="number" name="age" min="18" max="60" required>

        <label>Password</label>
        <input type="password" name="password" minlength="6" maxlength="12" required>

        <label>Phone</label>
        <input type="text" pattern="[0-9]{10}" placeholder="10 digit number" required>

        <label>Country</label>
        <input type="text" value="India" readonly>

        <div class="terms">
            <input type="checkbox" checked required>
            I agree to terms & conditions
        </div>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
